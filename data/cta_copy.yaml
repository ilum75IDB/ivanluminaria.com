    text_intro: "Thirty years inside Oracle, PostgreSQL, MySQL — banking, telco, insurance, Italian public sector and other markets."
    bridge: "To get to know me better,"
    link_profile: "visit my DBA profile"
    or_word: "or"
    link_dossier: "download my dossier in PDF"
    pages_note: "(4 pages)"
  es:
    title: "Sobre las bases de datos de tu empresa te vendría bien una opinión externa — arquitectura, rendimiento, seguridad, gobernanza — antes de tomar la próxima decisión."
    text_intro: "Treinta años dentro de Oracle, PostgreSQL, MySQL — banca, telco, seguros, administración pública italiana y otros mercados."
    bridge: "Para conocerme mejor,"
    link_profile: "ve a mi perfil DBA"
    or_word: "o"
    link_dossier: "descarga mi dosier en PDF"
    pages_note: "(4 páginas)"
  ro:
    title: "Pe bazele de date ale companiei tale ți-ar prinde bine o opinie externă — arhitectură, performanță, securitate, guvernanță — înainte de a lua următoarea decizie."
    text_intro: "Treizeci de ani în Oracle, PostgreSQL, MySQL — banking, telco, asigurări, administrația publică italiană și alte piețe."
    bridge: "Pentru a mă cunoaște mai bine,"
    link_profile: "vezi profilul meu DBA"
    or_word: "sau"
    link_dossier: "descarcă dosarul meu în PDF"
    pages_note: "(4 pagini)"

