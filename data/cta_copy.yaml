dwh-architect:
  profile_slug: "dwh-architect"
  dossier_file: "CV_DWH_Architect_Ivan_Luminaria_202603_EN.pdf"
  it:
    title: "Ci sono decisioni in azienda che aspettano dati e valori — numeri e tempi. Servono numeri veri nei tempi giusti. Report, modelli, ETL, BI, governance: sono elementi di un DWH che fornisce le risposte. Vuoi un parere? Parliamone."
    text_intro: "Vent'anni dentro star schema Kimball, ETL batch e near-real-time — banking, telco, assicurativo, PA italiana e altri mercati."
    bridge: "Per conoscermi meglio,"
    link_profile: "vai al mio profilo DWH Architect"
    or_word: "oppure"
    link_dossier: "scarica il mio dossier in PDF"
    pages_note: "(4 pagine)"
  en:
    title: "There are decisions in companies that wait on data and figures — numbers and timing. Real numbers in the right time are what's needed. Reports, models, ETL, BI, governance: these are the elements of a DWH that delivers the answers. Want an opinion? Let's talk."
    text_intro: "Twenty years inside Kimball star schemas, batch ETL and near-real-time — banking, telco, insurance, Italian public sector and other markets."
    bridge: "To get to know me better,"
    link_profile: "visit my DWH Architect profile"
    or_word: "or"
    link_dossier: "download my dossier in PDF"
    pages_note: "(4 pages)"
  es:
    title: "Hay decisiones en la empresa que esperan datos y valores — números y tiempos. Hacen falta números verdaderos en los tiempos correctos. Reports, modelos, ETL, BI, gobernanza: son elementos de un DWH que entrega las respuestas. ¿Quieres una opinión? Hablemos."
    text_intro: "Veinte años dentro de star schemas Kimball, ETL batch y near-real-time — banca, telco, seguros, administración pública italiana y otros mercados."
    bridge: "Para conocerme mejor,"
    link_profile: "ve a mi perfil DWH Architect"
    or_word: "o"
    link_dossier: "descarga mi dosier en PDF"
    pages_note: "(4 páginas)"
  ro:
    title: "Sunt decizii în companie care așteaptă date și valori — numere și timpi. E nevoie de numere adevărate la momentul potrivit. Reports, modele, ETL, BI, guvernanță: sunt elemente ale unui DWH care livrează răspunsurile. Vrei o părere? Hai să vorbim."
    text_intro: "Douăzeci de ani în star schema Kimball, ETL batch și near-real-time — banking, telco, asigurări, administrația publică italiană și alte piețe."
    bridge: "Pentru a mă cunoaște mai bine,"
    link_profile: "vezi profilul meu DWH Architect"
    or_word: "sau"
    link_dossier: "descarcă dosarul meu în PDF"
    pages_note: "(4 pagini)"

