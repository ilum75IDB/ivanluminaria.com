# Article CTA — copy editoriale per i 4 profili professionali
# Usato da: layouts/_partials/article-cta.html
# Renderizzato in coda agli articoli (Section "posts").
#
# Struttura:
#   <profilo>:
#     profile_slug: <slug-URL-resumes>
#     dossier_file: <nome-file-PDF-in-static/downloads/>
#     <lang>:
#       title: headline lunga
#       text_intro: frase identitaria (anni dentro X — settori)
#       bridge: frase ponte verso i link ("Per conoscermi meglio,")
#       link_profile: testo del link al profilo
#       or_word: "oppure" / "or" / "o" / "sau"
#       link_dossier: testo del link al PDF
#       pages_note: "(4 pagine)" — nota tra parentesi dopo il PDF

oracle-dba:
  profile_slug: "oracle-dba"
  dossier_file: "CV_Oracle_DBA_Ivan_Luminaria_202603_EN.pdf"
  it:
    title: "Sui database della tua azienda ti farebbe comodo un parere esterno — architettura, performance, sicurezza, governance — prima di prendere la prossima decisione."
