<!--
  about-passion-pill.html — singola pill (icona + nome)
  Params:
    icon — emoji o glifo (es. "📷")
    name — nome della passione
-->
<div class="about-passion-pill">
  <span class="about-passion-pill-icon">{{ .Get "icon" }}</span>
  <div class="about-passion-pill-name">{{ .Get "name" }}</div>
</div>
