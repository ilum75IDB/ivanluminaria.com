<!--
  about-hero-quote.html — card citazione finale (sfondo ivan-blue)
  Params:
    attr — attribuzione opzionale (es. "Ivan Luminaria")
  Inner: testo della citazione (markdown)
-->
<div class="about-hero-quote">
  <blockquote>{{ .Inner | markdownify }}</blockquote>
  {{ with .Get "attr" }}
    <div class="about-hero-quote-attr">— {{ . }}</div>
  {{ end }}
</div>
