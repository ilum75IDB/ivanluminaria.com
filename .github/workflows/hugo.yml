name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  schedule:
    # Pubblicazione articoli schedulati al martedi'.
    # Articolo schedulato alle 08:03 +01:00 (07:03 UTC inverno / 06:03 UTC estate).
    # Post LinkedIn alle 10:05 CEST = 08:05 UTC.
    #
    # Due cron in finestra mattutina, fuori dai picchi 0X:00 / 0X:05:
    # - 05:47 UTC = 07:47 CEST (estate) / 06:47 CET (inverno) — primo tentativo
    # - 06:47 UTC = 08:47 CEST (estate) / 07:47 CET (inverno) — backup +1h
    # Margine di 1h+ prima del post LinkedIn anche con delay GitHub.
    - cron: '47 5 * * 2'
    - cron: '47 6 * * 2'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
